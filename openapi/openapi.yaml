openapi: 3.0.3

info:
  title: Statutory Action Parcels API
  version: 1.0.0
  description: |
    API for managing Statutory Action Parcel data.
    Supports fetching all parcels with a GET request.
    Supports bulk create, update, and delete operations in a single PATCH request.

  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: https://api.statutory-actions.local/v1
    description: Production API

paths:
  /statutory-actions/{statActionId}:
    parameters:
      - name: statActionId
        in: path
        required: true
        description: Unique identifier of the statutory action.
        schema:
          type: integer
    get:
      summary: Get statutory action with parcels
      description: |
        Retrieve a statutory action record and its associated parcel collection.
        Returns statutory action metadata plus all parcel records with read-only server-managed fields.
      operationId: getStatutoryAction
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Statutory action and parcel collection retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/GetStatutoryActionResponse'
              examples:
                success:
                  summary: Statutory action with parcels
                  value:
                    statutoryActionType: "Road Closure"
                    status: "Active"
                    surveyWorkIdVesting: 22001
                    gazetteYear: "2026"
                    gazettePage: 145
                    gazetteType: "Government Gazette"
                    otherLegality: "Transport Infrastructure Act"
                    recordedDate: "2026-02-18T10:25:30Z"
                    gazetteNoticeId: 900123
                    parcels:
                      - parcelId: 3100000
                        appellation: "Lot A, Block 1"
                        action: "Create"
                        parcelIntent: "Road"
                        purpose: "Land Declared Road"
                        purposeStatus: "Current"
                        name: "Lot A"
                        comments: null
                        imageId: 4100000
                      - parcelId: 3100001
                        appellation: "Lot B, Block 2"
                        action: "Extinguished"
                        parcelIntent: "DCDB"
                        purpose: "Land Declared Road"
                        purposeStatus: "Historic"
                        name: "Lot B"
                        comments: "Legacy parcel"
                        imageId: null

        '401':
          description: Unauthorized — invalid or missing bearer token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

    patch:
      summary: Bulk update parcels (create, update, delete)
      description: |
        Atomically apply a batch of parcel operations (create, update, delete)
        and optionally update statutory action metadata for the action identified by statActionId.
        This endpoint is designed to support full-form UX patterns where users can:
        - Update statutory action metadata (type, status, gazette fields, etc.)
        - Add new parcel rows (create operations)
        - Edit existing parcel cells (update operations)
        - Remove parcel rows (delete operations)

        Then submit the entire form in one PATCH request.

        The endpoint processes statutory action updates and all parcel rows in order,
        returning per-row results and metadata update confirmation.
      operationId: patchStatutoryAction
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PatchParcelsRequest'
            examples:
              mixed_operations:
                summary: Parcel operations only
                value:
                  rows:
                    - operation: create
                      purpose: "Residential"
                      purposeStatus: "Active"
                      name: "Lot A"
                      comments: "New residential lot"
                      imageId: null
                    - operation: update
                      parcelId: 42
                      purpose: "Commercial"
                      purposeStatus: "Pending"
                    - operation: delete
                      parcelId: 99
              full_update:
                summary: Update statutory action metadata and parcels
                value:
                  statutoryActionType: "Road Closure"
                  status: "Active"
                  gazetteYear: "2026"
                  gazettePage: 150
                  gazetteType: "Government Gazette"
                  rows:
                    - operation: create
                      purpose: "Residential"
                      purposeStatus: "Active"
                      name: "Lot B"

      responses:
        '200':
          description: All operations succeeded
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchParcelsResponse'
              examples:
                success:
                  summary: All rows processed successfully
                  value:
                    results:
                      - operation: create
                        parcelId: 101
                        status: success
                      - operation: update
                        parcelId: 42
                        status: success
                      - operation: delete
                        parcelId: 99
                        status: success

        '207':
          description: Partial success — some rows failed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PatchParcelsResponse'
              examples:
                partial_success:
                  summary: One row failed, others succeeded
                  value:
                    results:
                      - operation: create
                        parcelId: 101
                        status: success
                      - operation: update
                        parcelId: 42
                        status: error
                        error: "Parcel not found"
                      - operation: delete
                        parcelId: 99
                        status: success

        '400':
          description: Bad request — malformed payload or validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '422':
          description: Unprocessable entity — all rows rejected due to semantic errors
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Bearer token authentication

  schemas:
    PatchParcelsRequest:
      type: object
      required:
        - rows
      properties:
        statutoryActionType:
          type: string
          nullable: true
          description: Type/category of the statutory action (optional update)
        status:
          type: string
          nullable: true
          description: Current lifecycle status of the statutory action (optional update)
        gazetteYear:
          type: string
          nullable: true
          description: Gazette publication year associated with the action (optional update)
        gazettePage:
          type: integer
          nullable: true
          description: Gazette page number (optional update)
        gazetteType:
          type: string
          nullable: true
          description: Gazette publication type (optional update)
        otherLegality:
          type: string
          nullable: true
          description: Additional legal basis text for the action (optional update)
        gazetteNoticeId:
          type: integer
          nullable: true
          description: Gazette notice identifier (optional update)
        rows:
          type: array
          minItems: 1
          maxItems: 1000
          items:
            $ref: '#/components/schemas/ParcelRow'
          description: Array of parcel operations (create, update, or delete)

    ParcelRow:
      oneOf:
        - $ref: '#/components/schemas/CreateParcelRow'
        - $ref: '#/components/schemas/UpdateParcelRow'
        - $ref: '#/components/schemas/DeleteParcelRow'
      discriminator:
        propertyName: operation
        mapping:
          create: '#/components/schemas/CreateParcelRow'
          update: '#/components/schemas/UpdateParcelRow'
          delete: '#/components/schemas/DeleteParcelRow'

    CreateParcelRow:
      type: object
      required:
        - operation
        - purpose
        - purposeStatus
        - name
      properties:
        operation:
          type: string
          enum: [ create ]
          description: Operation type identifier
        purpose:
          type: string
          description: Purpose of the parcel (e.g., "Residential", "Commercial")
        purposeStatus:
          type: string
          description: Status of the parcel purpose (e.g., "Active", "Pending", "Inactive")
        name:
          type: string
          description: Name or identifier for the parcel
        comments:
          type: string
          nullable: true
          description: Optional comments about the parcel
        imageId:
          type: integer
          nullable: true
          description: Optional reference to an associated image
      additionalProperties: false

    UpdateParcelRow:
      type: object
      required:
        - operation
        - parcelId
      properties:
        operation:
          type: string
          enum: [ update ]
          description: Operation type identifier
        parcelId:
          type: integer
          description: Primary key of the parcel to update
        purpose:
          type: string
          description: Purpose of the parcel (optional field for partial updates)
        purposeStatus:
          type: string
          description: Status of the parcel purpose (optional field for partial updates)
        name:
          type: string
          description: Name or identifier for the parcel (optional field for partial updates)
        comments:
          type: string
          nullable: true
          description: Optional comments about the parcel
        imageId:
          type: integer
          nullable: true
          description: Optional reference to an associated image
      additionalProperties: false

    DeleteParcelRow:
      type: object
      required:
        - operation
        - parcelId
      properties:
        operation:
          type: string
          enum: [ delete ]
          description: Operation type identifier
        parcelId:
          type: integer
          description: Primary key of the parcel to delete
      additionalProperties: false

    PatchParcelsResponse:
      type: object
      required:
        - results
      properties:
        results:
          type: array
          items:
            $ref: '#/components/schemas/ParcelRowResult'
          description: Per-row results indicating success or failure

    ParcelRowResult:
      type: object
      required:
        - operation
        - status
      properties:
        operation:
          type: string
          enum: [ create, update, delete ]
          description: The operation type that was performed
        parcelId:
          type: integer
          description: |
            The parcel ID. For create operations, this is the server-assigned ID.
            For update and delete operations, this echoes the requested parcelId.
        status:
          type: string
          enum: [ success, error ]
          description: Outcome of the operation
        error:
          type: string
          description: |
            Error message if status is "error".
            Examples: "Parcel not found", "Validation failed", "Permission denied"
      additionalProperties: false

    ErrorResponse:
      type: object
      required:
        - error
      properties:
        error:
          type: string
          description: Human-readable error message
        details:
          type: string
          description: Additional error details or context
        requestId:
          type: string
          description: Unique identifier for this request (useful for debugging)

    Parcel:
      type: object
      required:
        - parcelId
      properties:
        parcelId:
          type: integer
          description: Unique identifier for the parcel (e.g., 3100000)
        appellation:
          type: string
          nullable: true
          description: Legal description of the parcel (e.g., "Lot A, Block 1"). Server-managed read-only field.
        action:
          type: string
          nullable: true
          description: Statutory action associated with the parcel (e.g., "Create", "Extinguished"). Server-managed read-only field.
        parcelIntent:
          type: string
          nullable: true
          description: Intent of the parcel (e.g., "Road", "DCDB"). Server-managed read-only field.
        purpose:
          type: string
          nullable: true
          description: Purpose of the parcel (e.g., "Land Declared Road")
        purposeStatus:
          type: string
          nullable: true
          description: Status of the parcel's purpose (e.g., "Current", "Historic")
        name:
          type: string
          nullable: true
          description: Name or identifier for the parcel
        comments:
          type: string
          nullable: true
          description: Optional comments about the parcel
        imageId:
          type: integer
          nullable: true
          description: Optional reference to an associated image (e.g., 4100000)

    GetStatutoryActionResponse:
      type: object
      required:
        - statutoryActionType
        - status
        - surveyWorkIdVesting
        - gazetteYear
        - gazettePage
        - gazetteType
        - otherLegality
        - recordedDate
        - gazetteNoticeId
        - parcels
      properties:
        statutoryActionType:
          type: string
          description: Type/category of the statutory action.
        status:
          type: string
          description: Current lifecycle status of the statutory action.
        surveyWorkIdVesting:
          type: integer
          description: Identifier for the vesting survey work.
        gazetteYear:
          type: string
          description: Gazette publication year associated with the action.
        gazettePage:
          type: integer
          description: Gazette page number.
        gazetteType:
          type: string
          description: Gazette publication type.
        otherLegality:
          type: string
          description: Additional legal basis text for the action.
        recordedDate:
          type: string
          format: date-time
          description: Date/time the statutory action was recorded.
        gazetteNoticeId:
          type: integer
          description: Gazette notice identifier.
        parcels:
          type: array
          items:
            $ref: '#/components/schemas/Parcel'
          description: Array of statutory action parcel records
